# ----------------------------------------------------------------------------
# Static SPA server for the Shopping List PWA.
#
# HTTPS and HTTP→HTTPS redirects are handled by the reverse proxy (Traefik
# under Dokploy). This vhost stays plain HTTP on :80.
# ----------------------------------------------------------------------------

# Pre-compress common text types inline. Files are already minified by Vite,
# so the win here is network bytes, not CPU.
gzip              on;
gzip_comp_level   6;
gzip_min_length   1024;
gzip_proxied      any;
gzip_vary         on;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/manifest+json
    application/xml
    image/svg+xml
    font/woff2;

# Drop the nginx version from error pages and Server header.
server_tokens off;

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    root         /usr/share/nginx/html;
    index        index.html;

    # Sensible defaults.
    charset              utf-8;
    client_max_body_size 2m;

    # Baseline security headers. HSTS is deliberately omitted — Traefik
    # handles TLS and should own that header so we don't double-up.
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-Frame-Options        "SAMEORIGIN"        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), camera=(), microphone=()" always;

    # Content-Security-Policy. The PocketBase origin is injected at container
    # start from ${PB_ORIGIN} (see docker-entrypoint). Google Fonts are
    # allow-listed explicitly; all scripts must come from us (no 'unsafe-eval').
    # 'unsafe-inline' for styles is required by Vite's inlined critical CSS.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' ${PB_ORIGIN} wss://${PB_HOST}; manifest-src 'self'; worker-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Simple liveness probe for the container HEALTHCHECK.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Hashed Vite assets: immutable, cache for a year.
    location ^~ /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Service worker: MUST NOT be cached, otherwise updates stall for every user.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires off;
        try_files $uri =404;
    }

    # Workbox runtime + PWA manifest: same policy as sw.js.
    location ~ ^/(workbox-[^/]+\.js|manifest\.webmanifest|registerSW\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        try_files $uri =404;
    }

    # SPA entry — don't cache the HTML shell so new builds are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # Static files with fingerprints/extensions served directly, everything
    # else falls through to index.html so Vue Router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
